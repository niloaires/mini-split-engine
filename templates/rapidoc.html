<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% load static %}
  <title>{{ title|default:"Teste técnico Cakto" }} — API Docs</title>
  <link rel="icon" type="image/png" href="{% static 'cackto_logo.png' %}">

  <script type="module" src="{{ dist }}/dist/rapidoc-min.js"></script>

  <style>
    :root {
      --bg-primary:   #0f1117;
      --bg-nav:       #111827;
      --accent:       #6366f1;
      --text-primary: #f1f5f9;
      --text-muted:   #94a3b8;
      --border:       #1e293b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background-color: var(--bg-primary);
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    #topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 28px;
      background-color: var(--bg-nav);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    #topbar .logo {
      height: 36px;
      width: auto;
      max-width: 160px;
      object-fit: contain;
      object-position: left center;
    }

    #topbar .brand      { display: flex; flex-direction: column; line-height: 1.2; }
    #topbar .brand-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    #topbar .brand-sub  { font-size: 11px; color: var(--text-muted); letter-spacing: .03em; }

    #topbar .badge {
      margin-left: auto;
      background-color: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
    }

    rapi-doc {
      display: block;
      width: 100%;
      height: calc(100vh - 61px);
    }
  </style>
</head>
<body>

  <div id="topbar">


    <div class="brand">
      <span class="brand-name">Teste técnico Cakto</span>
      <span class="brand-sub">{{ title|default:"Mini Split Engine" }}</span>
    </div>

    <span class="badge">v1.0.0</span>
  </div>

  <rapi-doc
    spec-url="{{ schema_url }}"
    render-style="focused"
    layout="column"
    theme="dark"
    bg-color="#0f1117"
    text-color="#f1f5f9"
    primary-color="#6366f1"
    nav-bg-color="#111827"
    nav-text-color="#94a3b8"
    nav-hover-bg-color="#1e293b"
    nav-hover-text-color="#f1f5f9"
    nav-accent-color="#6366f1"
    header-color="#161b27"
    show-header="false"
    show-info="true"
    show-components="true"
    show-side-nav="true"
    allow-authentication="true"
    allow-try="true"
    allow-search="true"
    allow-spec-url-load="false"
    allow-spec-file-load="false"
    default-schema-tab="schema"
    response-area-height="400px"
    schema-style="table"
    sort-endpoints-by="path"
    update-route="true"
  >

    <img
      slot="nav-logo"
      src="{% static 'cackto_logo.png' %}"
      alt="Teste técnico Cakto"
      style="height: 32px; width: auto; max-width: 180px; object-fit: contain; margin: 12px 16px; display: block;"
    />

  </rapi-doc>

</body>
</html>
